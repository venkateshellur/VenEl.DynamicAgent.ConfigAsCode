name: Publish NuGet Packages

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore VenEl.DynamicAgents.slnx

    - name: Build and Pack Core
      run: dotnet pack VenEl.DynamicAgents.Core/VenEl.DynamicAgents.Core.csproj -c Release

    - name: Build and Pack Infrastructure
      run: dotnet pack VenEl.DynamicAgents.Infrastructure/VenEl.DynamicAgents.Infrastructure.csproj -c Release

    - name: Push to NuGet.org
      run: |
        dotnet nuget push VenEl.DynamicAgents.Core/bin/Release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        dotnet nuget push VenEl.DynamicAgents.Infrastructure/bin/Release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
